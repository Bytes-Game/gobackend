# One-shot monitoring stack for devf backend.
#
# Usage (from devb/monitoring/):
#   docker compose up -d
#
# Access:
#   Prometheus     : http://localhost:9090
#   Alertmanager   : http://localhost:9093
#   Grafana        : http://localhost:3000  (admin / admin on first login)
#
# If your backend runs on the host (not in this compose network), point
# prometheus.yml target at host.docker.internal:8081 instead of backend:8081,
# and remove the `backend` service block below.

services:
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prom_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=14d
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alert_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "9093:9093"

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - graf_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  # Optional: run the backend inside the monitoring network too. Comment out
  # if the backend already runs on the host.
  backend:
    build:
      context: ../
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8081
      - REDIS_ADDR=redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles: ["full"]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    profiles: ["full"]

volumes:
  prom_data:
  alert_data:
  graf_data:
