name: hls-worker

# $0 transcode fleet: GitHub-hosted runners are free for public repos
# and ship with ffmpeg preinstalled. Every 30 minutes (and on manual
# dispatch) this drains the pending-transcode queue and exits — an
# always-on background worker with ≤30min latency and zero hosting cost.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   HLS_WORKER_TOKEN     — same value as the backend's env var
#   R2_ACCOUNT_ID, R2_BUCKET, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
#   R2_PUBLIC_BASE_URL   — optional OVERRIDE (custom domain/CDN). When
#                          unset, the worker uses the publicBaseUrl the
#                          backend sends with each job — same base the
#                          backend builds every other media URL from.
#
# Concurrency-safe by construction: the backend's FOR UPDATE SKIP LOCKED
# claim means overlapping runs never double-transcode; the group setting
# below avoids wasting minutes anyway.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

concurrency:
  group: hls-worker
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 24
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true
          cache-dependency-path: go.sum

      # ubuntu-24.04 runner images no longer ship ffmpeg preinstalled
      # (the first live run failed with "executable file not found").
      # apt install adds ~30-60s per run — still free.
      - name: install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg && ffmpeg -version | head -1

      # TWO parallel workers: the backend's FOR UPDATE SKIP LOCKED claim
      # makes concurrent workers safe by construction, and the runner's
      # 4 cores comfortably fit two ffmpeg encodes — ~2x videos per run.
      # -max-runtime 20m makes both exit CLEANLY before the job's
      # 24-minute kill switch: runs end green, nothing is stranded
      # mid-transcode, and the next run (cron or manual) continues the
      # remaining queue.
      - name: drain transcode queue
        env:
          BACKEND_URL: https://gobackend-9nd8.onrender.com
          HLS_WORKER_TOKEN: ${{ secrets.HLS_WORKER_TOKEN }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
        run: |
          go build -o /tmp/hls-worker ./cmd/hls-worker
          /tmp/hls-worker -drain -max-runtime 20m &
          /tmp/hls-worker -drain -max-runtime 20m &
          wait
